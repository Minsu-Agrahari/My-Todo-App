<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo-App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    
    <header>
        <h1>
            Todo-App -- Add your Task😎
        </h1>
    </header>

    <main>
        <section id="inputFiled">
            <input type="text" placeholder="Enter your Task ... " id="inputTask">
            <button id="addBtnRef">Add</button>
        </section>

        <section id="TaskList">
            <ol id="parentListRef">
                <!-- <li>Task-1</li>
                <li>Task-2</li>
                <li>Task-3</li> -->
            </ol>
        </section>

        <section id="TotalTaskCounter">
            <div>Total Task: <span id="totalTask">0</span>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>

</html>
